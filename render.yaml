# Render Blueprint (Infrastructure as Code) — https://render.com/docs/blueprint-spec
# Deploy with: Render Dashboard → New + → Blueprint → select this repo.
#
# SPA ROUTING FIX: the static site below declares the rewrite rule
# `/* -> /index.html`. This makes every unknown path serve the React app,
# so reloading deep client-side routes (/students, /fees, /tc, ...) returns
# HTTP 200 with index.html instead of Render's "Not Found" page.
#
# IMPORTANT: Render blueprints only manage services they create themselves.
# If your current live services were created manually in the dashboard, this
# file will NOT update them. For the existing live static site, do ONE of:
#   1. Dashboard fix (recommended): Static Site → Redirects/Rewrites →
#      Add rule → Source: /*  Destination: /index.html  Action: Rewrite, or
#   2. Just redeploy it (Manual Deploy → Clear build cache & deploy): the
#      client build now also emits a 404.html SPA fallback, which Render
#      serves for unknown paths.
# On top of that, `client/public/_redirects` already covers Netlify deploys.

services:
  # ── React frontend (static site) ─────────────────────────────────────────
  - type: web
    name: br-school-portal-client
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        sync: false # set this to your backend URL, e.g. https://br-school-portal-server.onrender.com
    # Client-side routing support: serve index.html for every path that
    # doesn't match an existing static asset.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Express backend (web service) ────────────────────────────────────────
  - type: web
    name: br-school-portal-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SCHOOL_CODE
        sync: false
      - key: CLIENT_URL
        sync: false # set this to your frontend URL, e.g. https://br-school-portal-client.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
